<!DOCTYPE html>
<html>
    <head>
        <link rel="icon" href="data:;base64,=">
        <title>文件服务登录</title>
        <meta http-equiv="content-type" content="text/html;charset=utf-8">
        <style>
            body{
                margin: 0;
                font-family: Arial, sans-serif;
                background: #f4f6f8;
                color: #222;
            }
            .wrap{
                width: 760px;
                margin: 60px auto;
                padding: 30px;
                background: #fff;
                border: 1px solid #d8dde3;
            }
            .forms{
                display: flex;
                gap: 28px;
            }
            .box{
                flex: 1;
                border: 1px dotted #9aa4ad;
                padding: 20px;
            }
            label{
                display: block;
                margin: 12px 0 6px;
            }
            input{
                width: 100%;
                box-sizing: border-box;
                padding: 8px;
            }
            button{
                margin-top: 16px;
                padding: 8px 18px;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div class="wrap">
            <h2>WebFileServer</h2>
            <div class="forms">
                <div class="box">
                    <h3>登录</h3>
                    <form action="/api/login" method="post">
                        <label>用户名</label>
                        <input name="username" required />
                        <label>密码</label>
                        <input name="password" type="password" required />
                        <button type="submit">登录</button>
                    </form>
                </div>
                <div class="box">
                    <h3>注册</h3>
                    <form action="/api/register" method="post">
                        <label>用户名</label>
                        <input name="username" required />
                        <label>密码</label>
                        <input name="password" type="password" required />
                        <button type="submit">注册</button>
                    </form>
                </div>
            </div>
        </div>
    </body>
</html>
